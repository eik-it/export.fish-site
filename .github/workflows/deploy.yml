# Deploy to GitHub Pages and notify search engines via IndexNow.
#
# IndexNow key file: public/24fe6003d5a54402911dd3abb4d27cb0.txt
# Served at: https://eksportfiske.no/24fe6003d5a54402911dd3abb4d27cb0.txt
#
# After a successful Pages deploy the "indexnow" job fetches the live sitemap,
# extracts all URLs, and POSTs them to api.indexnow.org so Bing (and other
# participating engines) index the site immediately.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history needed so the sitemap build can compute <lastmod>
          # via `git log -1 --format=%cI -- <file>` for each page.
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.TURNSTILE_SITE_KEY }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  indexnow:
    needs: deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    steps:
      - name: Ping IndexNow
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          INDEXNOW_KEY="24fe6003d5a54402911dd3abb4d27cb0"
          HOST="eksportfiske.no"
          KEY_LOCATION="https://${HOST}/${INDEXNOW_KEY}.txt"
          REPO="${GITHUB_REPOSITORY}"
          HEAD_SHA="${GITHUB_SHA}"

          # Find the previous successful deploy.yml run on master, so we can
          # diff against it and submit only URLs that actually changed.
          # Per IndexNow docs: every submitted URL counts against crawl quota,
          # and only changed URLs should be published.
          PREV_SHA=$(gh api \
            "/repos/${REPO}/actions/workflows/deploy.yml/runs?branch=master&status=success&per_page=10" \
            --jq "[.workflow_runs[] | select(.head_sha != \"${HEAD_SHA}\")][0].head_sha" 2>/dev/null || echo "")

          declare -a URL_LIST=()
          SUBMIT_HOMEPAGE=false

          if [ -n "${PREV_SHA}" ] && [ "${PREV_SHA}" != "null" ]; then
            echo "Diffing ${PREV_SHA}..${HEAD_SHA}"
            CHANGED=$(gh api "/repos/${REPO}/compare/${PREV_SHA}...${HEAD_SHA}" \
              --jq '.files[].filename' 2>/dev/null || echo "")

            while IFS= read -r FILE; do
              [ -z "${FILE}" ] && continue
              case "${FILE}" in
                src/content/blog/*.md)
                  SLUG=$(basename "${FILE}" .md)
                  URL_LIST+=("https://${HOST}/blogg/${SLUG}/")
                  ;;
                src/pages/index.astro)
                  URL_LIST+=("https://${HOST}/")
                  ;;
                src/pages/blogg/index.astro)
                  URL_LIST+=("https://${HOST}/blogg/")
                  ;;
                src/pages/blogg/\[*\].astro)
                  # Blog template change affects every post — submit homepage as a canary.
                  SUBMIT_HOMEPAGE=true
                  ;;
                src/pages/*/index.astro)
                  PAGE=$(echo "${FILE}" | sed -E 's|src/pages/(.+)/index\.astro|\1|')
                  URL_LIST+=("https://${HOST}/${PAGE}/")
                  ;;
                src/pages/*.astro)
                  PAGE=$(echo "${FILE}" | sed -E 's|src/pages/(.+)\.astro|\1|')
                  URL_LIST+=("https://${HOST}/${PAGE}/")
                  ;;
                src/layouts/*|src/components/*|src/styles/*|astro.config.*|tailwind.config.*|public/*)
                  # Site-wide impact — submit homepage as a canary; let Bing
                  # re-crawl the rest based on sitemap lastmod.
                  SUBMIT_HOMEPAGE=true
                  ;;
                *)
                  ;;
              esac
            done <<< "${CHANGED}"

            if [ "${SUBMIT_HOMEPAGE}" = "true" ]; then
              URL_LIST+=("https://${HOST}/")
            fi
          else
            echo "No previous successful run found — falling back to full sitemap submission."
          fi

          # Deduplicate and JSON-encode.
          if [ ${#URL_LIST[@]} -gt 0 ]; then
            URLS_JSON=$(printf '%s\n' "${URL_LIST[@]}" | sort -u | jq -Rs '[split("\n")[] | select(length > 0)]')
          else
            URLS_JSON="[]"
          fi

          # No-op deploy (e.g. only CI/docs/workflow files changed): skip the ping.
          if [ -n "${PREV_SHA}" ] && [ "${URLS_JSON}" = "[]" ]; then
            echo "No content URLs changed since previous deploy — skipping IndexNow ping."
            exit 0
          fi

          # Cold-start fallback: first deploy or unknown previous SHA — submit the full sitemap once.
          if [ "${URLS_JSON}" = "[]" ]; then
            SITEMAP_URL="https://${HOST}/sitemap-0.xml"
            URLS_JSON=$(curl -sf "${SITEMAP_URL}" \
              | grep -oP '(?<=<loc>)[^<]+' \
              | jq -Rs '[split("\n")[] | select(length > 0)]')
          fi

          if [ "${URLS_JSON}" = "[]" ]; then
            echo "No URLs to submit."
            exit 0
          fi

          PAYLOAD=$(jq -n \
            --arg host "${HOST}" \
            --arg key "${INDEXNOW_KEY}" \
            --arg keyLocation "${KEY_LOCATION}" \
            --argjson urlList "${URLS_JSON}" \
            '{host: $host, key: $key, keyLocation: $keyLocation, urlList: $urlList}')

          echo "Submitting $(echo "${URLS_JSON}" | jq 'length') URLs to IndexNow:"
          echo "${URLS_JSON}" | jq -r '.[]' | sed 's/^/  - /'

          # Generic relay (Bing, Yandex, Naver, Seznam, Yep) plus Bing's
          # dedicated endpoint to guarantee surfacing in Bing Webmaster Tools.
          OVERALL_FAIL=0
          for ENDPOINT in "https://api.indexnow.org/IndexNow" "https://www.bing.com/indexnow"; do
            HTTP_STATUS=$(curl -s -o /tmp/indexnow_response.txt -w "%{http_code}" \
              -X POST "${ENDPOINT}" \
              -H "Content-Type: application/json; charset=utf-8" \
              -d "${PAYLOAD}")

            echo "[${ENDPOINT}] status=${HTTP_STATUS}"
            cat /tmp/indexnow_response.txt; echo

            # 200 = OK, 202 = Accepted (queued) — both are success
            if [ "${HTTP_STATUS}" != "200" ] && [ "${HTTP_STATUS}" != "202" ]; then
              echo "[${ENDPOINT}] returned unexpected status ${HTTP_STATUS}"
              OVERALL_FAIL=1
            fi
          done

          if [ "${OVERALL_FAIL}" = "1" ]; then
            exit 1
          fi
          echo "IndexNow pings successful."
